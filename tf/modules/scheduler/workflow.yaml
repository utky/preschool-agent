main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: $${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - job_name: ${job_name}
          - job_location: ${region}
          - crawler_job_name: ${crawler_job_name}
          - input_start: $${default(map.get(args, "start_datetime"), null)}
          - input_end: $${default(map.get(args, "end_datetime"), null)}
          - interval_hours: $${int(default(map.get(args, "interval_hours"), 6))}

    - route:
        switch:
          - condition: $${input_start != null and input_end != null}
            assign:
              - start_datetime: $${input_start}
              - end_datetime: $${input_end}
            next: log_start
        next: compute_default

    - compute_default:
        assign:
          - now_epoch: $${int(sys.now())}
          - end_epoch: $${now_epoch - (now_epoch % 3600)}
          - start_epoch: $${end_epoch - interval_hours * 3600}
          - end_str: $${time.format(end_epoch)}
          - start_str: $${time.format(start_epoch)}
          - start_datetime: $${text.substring(start_str, 0, 19) + "Z"}
          - end_datetime: $${text.substring(end_str, 0, 19) + "Z"}

    - log_start:
        call: sys.log
        args:
          text: '$${"workflow starting: start=" + start_datetime + " end=" + end_datetime}'
          severity: INFO

    - run_crawler:
        try:
          call: googleapis.run.v2.projects.locations.jobs.run
          args:
            name: '$${"projects/" + project_id + "/locations/" + job_location + "/jobs/" + crawler_job_name}'
            body:
              overrides:
                containerOverrides:
                  - env:
                      - name: SINCE_DATETIME
                        value: $${start_datetime}
          result: crawler_execution
        retry:
          predicate: $${retry_predicate}
          max_retries: 3
          backoff:
            initial_delay: 30
            max_delay: 300
            multiplier: 2

    - log_crawler_done:
        call: sys.log
        args:
          text: '$${"crawler completed: start=" + start_datetime}'
          severity: INFO

    - run_job:
        try:
          call: googleapis.run.v2.projects.locations.jobs.run
          args:
            name: '$${"projects/" + project_id + "/locations/" + job_location + "/jobs/" + job_name}'
            body:
              overrides:
                containerOverrides:
                  - args:
                      - "build"
                      - "--no-use-colors"
                      - "--vars"
                      - '$${"{\"start_datetime\": \"" + start_datetime + "\", \"end_datetime\": \"" + end_datetime + "\"}"}'
          result: job_execution
        retry:
          predicate: $${retry_predicate}
          max_retries: 3
          backoff:
            initial_delay: 30
            max_delay: 300
            multiplier: 2

    - log_done:
        call: sys.log
        args:
          text: '$${"dbt job completed: start=" + start_datetime + " end=" + end_datetime}'
          severity: INFO

    - finish:
        return:
          start_datetime: $${start_datetime}
          end_datetime: $${end_datetime}
          crawler_execution: $${crawler_execution}
          dbt_execution: $${job_execution}

retry_predicate:
  params: [e]
  steps:
    - check:
        switch:
          # default()でcodeフィールドが存在しない場合のKeyErrorを回避
          - condition: $${default(map.get(e, "code"), 0) == 503 or default(map.get(e, "code"), 0) == 429}
            return: true
    - default:
        return: false
